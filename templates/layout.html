<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineRef{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1c1f26;
            color: #e8e8e8;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        nav {
            background: #1c1f26;
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2e3340;
        }

        nav .logo {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 400;
        color: #e8e8e8;
        text-decoration: none;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-style: italic;
        }

        nav .links a {
            color: #e8e8e8;
            text-decoration: none;
            margin-left: 32px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        nav .links a:hover { opacity: 0.5; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 48px;
        }

        .flash {
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid #e8e8e8;
            background: #2e3340;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #e8e8e8;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #e8e8e8;
            outline: none;
            margin-bottom: 24px;
            display: block;
        }

        input::placeholder, textarea::placeholder {
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 11px;
        }

        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        select option {
            background: #1c1f26;
            color: #e8e8e8;
        }

        button[type="submit"] {
            background: #e8e8e8;
            color: #1c1f26;
            border: none;
            padding: 14px 48px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        button[type="submit"]:hover { opacity: 0.7; }

        .form-container {
            max-width: 480px;
            margin: 80px auto;
        }

        .form-title {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 48px;
            font-weight: 500;
            color: #888;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">CineRef</a>
        <div class="links">
            {% if session["user_id"] %}
                <a href="/browse">Browse</a>
                <a href="/upload">Upload</a>
                <a href="/collections">Collections</a>
                <a href="/profile/{{ session['username'] }}">Profile</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/browse">Browse</a>
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% for message in get_flashed_messages() %}
            <div class="flash">{{ message }}</div>
        {% endfor %}

        {% block main %}{% endblock %}
    </div>
</body>
</html>
