<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineRef{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        nav {
            background: #1a1a1a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        nav .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: 2px;
        }

        nav .links a {
            color: #999;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav .links a:hover { color: #fff; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .flash {
            padding: 12px 16px;
            margin-bottom: 24px;
            border-radius: 4px;
            font-size: 14px;
        }

        .flash.error { background: #2d1a1a; color: #ff6b6b; border: 1px solid #3d2020; }
        .flash.success { background: #1a2d1a; color: #6bff6b; border: 1px solid #203d20; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">CINEREF</a>
        <div class="links">
            {% if session["user_id"] %}
                <a href="/browse">Browse</a>
                <a href="/upload">Upload</a>
                <a href="/collections">Collections</a>
                <a href="/profile/{{ session['username'] }}">Profile</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/browse">Browse</a>
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% for message in get_flashed_messages() %}
            <div class="flash error">{{ message }}</div>
        {% endfor %}

        {% block main %}{% endblock %}
    </div>
</body>
</html>
