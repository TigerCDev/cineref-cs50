{% extends "layout.html" %}

{% block title %}
    Upload
{% endblock %}

{% block main %}
    <form action="/upload" method="post">
        <div>
            <input autocomplete="off" autofocus name="username" placeholder="Username" type="text">
        </div>
        <div>
            <input name="project_name" placeholder="Project Name" type="text">
        </div>
        <div>
            <input name="director" placeholder="Director" type="text">
        </div>
        <div>
            <input name="cinematographer" placeholder="Cinematographer" type="text">
        </div>
        <div>
            <input name="year" placeholder="Year" type="number">
        </div>
        <select name="work_type">
            <option value="featured">Featured Film</option>
            <option value="short_film">Short Film</option>
            <option value="music_video">Music Video</option>
            <option value="ads">ADS</option>
            <option value="photography">Photography</option>
        </select>
        <select name="shot_type">
            <option value="story">Story Shot</option>
            <option value="product">Product Shot</option>
            <option value="beauty">Beauty Shot</option>
            <option value="art">Artzy/Abstract</option>
        </select>
        <select name="shot_size">
            <option value="insert">INS</option>
            <option value="close_up">CU</option>
            <option value="medium_close_up">MCU</option>
            <option value="medium">MS</option>
            <option value="medium_long">MLS</option>
            <option value="long">LS</option>
            <option value="establish">ELS</option>
        </select>
        <select name="int_or_ext">
            <option value="int">INT</option>
            <option value="ext">EXT</option>
        </select>
        

        <div>
            <input name="country" placeholder="Country" type="text">
        </div>
        <div>
            <input name="password" placeholder="Password" type="password">
        </div>
        <div>
            <input name="confirmation" placeholder="Confirm Password" type="password">
        </div>
        <button type="submit">Register</button>
    </form>
{% endblock %}
